name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, Test, Format, Docker
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore DistributedBiometricPlatform.slnx

      - name: Build
        run: dotnet build DistributedBiometricPlatform.slnx --configuration Release --no-restore

      - name: Unit Tests
        run: dotnet test DistributedBiometricPlatform.slnx --configuration Release --no-build --verbosity normal

      - name: Format (verify-no-changes)
        run: dotnet format DistributedBiometricPlatform.slnx --verify-no-changes --verbosity diagnostic

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/BiometricPlatform.Api/Dockerfile
          push: false
          tags: biometric-platform-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
